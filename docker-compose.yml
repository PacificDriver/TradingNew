services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: mvp_user
      POSTGRES_PASSWORD: mvp_password
      POSTGRES_DB: mvp_trading
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # После изменений в backend/src пересоберите образ: docker compose build backend --no-cache && docker compose up -d backend
  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://mvp_user:mvp_password@postgres:5432/mvp_trading?schema=public
      JWT_SECRET: supersecretjwtkey
      PORT: 4000
    ports:
      - "4000:4000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
      NEXT_PUBLIC_WS_URL: ws://localhost:4000
    ports:
      - "3000:3000"

volumes:
  postgres_data:

